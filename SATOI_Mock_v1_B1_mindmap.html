<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SATOI - 治療マインドマップ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --night-deep: #0B1736;
  --night-medium: #1A2548;
  --night-glow: #2A3558;
  --starlight: #D4A95E;
  --starlight-soft: #E5C68A;
  --starlight-strong: #F0C97A;
  --morning-white: #F8F6F0;
  --healing-blue: #7FA8C9;
  --teal: #0D7377;
  --warm-orange: #D4622A;
  --text-primary: rgba(248,246,240,0.96);
  --text-secondary: rgba(248,246,240,0.78);
  --text-muted: rgba(248,246,240,0.55);
  --font: "Noto Sans JP", "Hiragino Kaku Gothic ProN", sans-serif;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width: 100%; min-height: 100vh; overflow-x: hidden; }
body {
  font-family: var(--font);
  color: var(--text-primary);
  background: linear-gradient(to bottom, var(--night-deep) 0%, var(--night-medium) 60%, var(--night-glow) 100%);
  font-size: 16px;
  line-height: 1.7;
  font-weight: 400;
}

/* === ヘッダー === */
.header {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  padding: 16px 32px;
  display: flex; align-items: center; justify-content: space-between; gap: 16px;
  background: linear-gradient(to bottom, rgba(11,23,54,0.95), rgba(11,23,54,0.1));
  backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
  border-bottom: 1px solid rgba(212,169,94,0.18);
}

.logo {
  font-size: 20px; font-weight: 500; letter-spacing: 0.22em; color: var(--text-primary);
  text-decoration: none; display: inline-flex; align-items: center;
}
.logo .dot {
  display: inline-block; width: 7px; height: 7px;
  background: var(--starlight); border-radius: 50%; margin-right: 9px;
  box-shadow: 0 0 8px var(--starlight);
}

.title-block { flex: 1; text-align: center; min-width: 0; }
.title-block h1 { font-size: 18px; font-weight: 500; color: var(--text-primary); }
.title-block .sub { font-size: 12px; color: var(--starlight); letter-spacing: 0.1em; margin-top: 2px; }

.header-actions { display: flex; gap: 10px; align-items: center; }
.btn-action {
  padding: 8px 16px; border-radius: 22px; font-size: 13px;
  background: transparent; border: 1px solid rgba(212,169,94,0.4); color: var(--text-secondary);
  cursor: pointer; transition: all 0.3s; text-decoration: none;
  display: inline-flex; align-items: center; gap: 6px;
}
.btn-action:hover { border-color: var(--starlight); color: var(--starlight); }
.btn-action.primary { background: var(--starlight); color: var(--night-deep); border-color: var(--starlight); font-weight: 500; }
.btn-action.primary:hover { background: var(--starlight-strong); color: var(--night-deep); }

/* === コントロール === */
.controls {
  position: fixed; top: 76px; left: 0; right: 0; z-index: 90;
  padding: 12px 32px;
  background: rgba(11,23,54,0.7); backdrop-filter: blur(10px);
  display: flex; align-items: center; gap: 14px; flex-wrap: wrap;
  border-bottom: 1px solid rgba(248,246,240,0.05);
}

.ctrl-group { display: inline-flex; align-items: center; gap: 8px; }
.ctrl-label { font-size: 12px; color: var(--text-muted); letter-spacing: 0.08em; }

.ctrl-select {
  background: rgba(248,246,240,0.05); color: var(--text-primary);
  border: 1px solid rgba(248,246,240,0.2);
  padding: 7px 14px; border-radius: 18px;
  font-family: var(--font); font-size: 13px;
  cursor: pointer; outline: none;
}
.ctrl-select option { background: var(--night-deep); }
.ctrl-select:focus { border-color: var(--starlight); }

.view-toggle { display: inline-flex; background: rgba(248,246,240,0.05); border-radius: 18px; padding: 3px; gap: 2px; }
.view-toggle-btn {
  padding: 6px 14px; background: transparent; color: var(--text-secondary);
  border: 0; border-radius: 16px; font-family: var(--font); font-size: 12px;
  cursor: pointer; transition: all 0.3s;
}
.view-toggle-btn.active { background: var(--starlight); color: var(--night-deep); font-weight: 500; }

.spacer { flex: 1; }

.stat-pill {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 7px 14px;
  background: linear-gradient(135deg, rgba(212,169,94,0.12), rgba(127,168,201,0.08));
  border: 1px solid rgba(212,169,94,0.3); border-radius: 18px;
  font-size: 12px; color: var(--text-secondary);
}
.stat-pill .num { color: var(--starlight); font-weight: 700; font-size: 14px; }

/* === メインキャンバス === */
.canvas-wrap {
  position: fixed; top: 138px; left: 0; right: 0; bottom: 0;
  overflow: auto;
  background:
    radial-gradient(ellipse at 20% 20%, rgba(212,169,94,0.05), transparent 60%),
    radial-gradient(ellipse at 80% 80%, rgba(127,168,201,0.05), transparent 60%);
}

.stars-layer { position: absolute; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
.star {
  position: absolute; background: var(--starlight); border-radius: 50%;
  opacity: 0; animation: twinkle 4s infinite ease-in-out;
}
@keyframes twinkle {
  0%, 100% { opacity: 0.1; transform: scale(0.8); }
  50% { opacity: 0.45; transform: scale(1); }
}

#mindmap {
  display: block;
  margin: 0 auto;
  position: relative;
  z-index: 1;
}

/* === ノードスタイル === */
.node {
  cursor: pointer;
  transition: all 0.3s;
}
.node circle, .node rect { transition: all 0.3s; }
.node:hover circle, .node:hover rect { filter: drop-shadow(0 0 12px rgba(212,169,94,0.7)); }

.node-label {
  font-family: var(--font);
  fill: var(--text-primary);
  pointer-events: none;
  user-select: none;
}

.node-count {
  font-family: var(--font);
  fill: var(--starlight);
  font-weight: 700;
  pointer-events: none;
  user-select: none;
}

.branch-line {
  fill: none;
  stroke: rgba(212,169,94,0.4);
  stroke-width: 1.5;
  transition: stroke 0.3s;
}
.branch-line.highlight { stroke: var(--starlight); stroke-width: 2.5; }

/* === ノード詳細パネル(右側固定) === */
.detail-panel {
  position: fixed;
  top: 138px; right: 0; bottom: 0; width: 380px;
  background: linear-gradient(180deg, rgba(11,23,54,0.96), rgba(26,37,72,0.96));
  border-left: 1px solid rgba(212,169,94,0.25);
  backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
  z-index: 80;
  padding: 28px 26px;
  overflow-y: auto;
  transform: translateX(100%);
  transition: transform 0.4s cubic-bezier(0.4,0,0.2,1);
}
.detail-panel.open { transform: translateX(0); }

.detail-close {
  position: absolute; top: 16px; right: 16px;
  width: 32px; height: 32px;
  background: rgba(248,246,240,0.08);
  border: 1px solid rgba(248,246,240,0.2);
  border-radius: 50%; cursor: pointer;
  color: var(--text-secondary); font-size: 16px;
  display: flex; align-items: center; justify-content: center;
}
.detail-close:hover { background: rgba(212,169,94,0.15); color: var(--starlight); }

.detail-eyebrow { font-size: 12px; color: var(--starlight); letter-spacing: 0.2em; margin-bottom: 8px; }
.detail-title { font-size: 22px; font-weight: 500; color: var(--text-primary); margin-bottom: 12px; line-height: 1.4; }
.detail-meta { font-size: 13px; color: var(--text-muted); margin-bottom: 18px; }

.detail-section { margin-bottom: 22px; padding-bottom: 22px; border-bottom: 1px solid rgba(248,246,240,0.08); }
.detail-section:last-child { border-bottom: 0; }
.detail-section h4 {
  font-size: 13px; color: var(--starlight); margin-bottom: 10px;
  letter-spacing: 0.12em; font-weight: 500;
}
.detail-section p { font-size: 14px; color: var(--text-secondary); line-height: 1.85; margin-bottom: 6px; }
.detail-section .stat-row {
  display: flex; justify-content: space-between; padding: 8px 0;
  font-size: 13px; color: var(--text-primary); border-bottom: 1px dotted rgba(248,246,240,0.1);
}
.detail-section .stat-row:last-child { border-bottom: 0; }
.detail-section .stat-row .v { color: var(--starlight); font-weight: 700; }

.detail-cta {
  display: block; margin-top: 22px;
  padding: 13px 20px;
  background: var(--starlight); color: var(--night-deep);
  border: 0; border-radius: 26px;
  font-family: var(--font); font-size: 14px; font-weight: 500;
  cursor: pointer; transition: all 0.3s; text-decoration: none;
  text-align: center;
}
.detail-cta:hover { background: var(--starlight-strong); transform: translateY(-1px); }
.detail-cta.secondary { background: transparent; color: var(--starlight); border: 1px solid var(--starlight); margin-top: 10px; }
.detail-cta.secondary:hover { background: rgba(212,169,94,0.1); }

/* === 凡例(右下) === */
.legend {
  position: fixed; left: 24px; bottom: 24px; z-index: 70;
  background: rgba(11,23,54,0.9);
  border: 1px solid rgba(212,169,94,0.25);
  border-radius: 12px;
  padding: 14px 18px;
  font-size: 12px;
  backdrop-filter: blur(8px);
  max-width: 320px;
}
.legend-title { color: var(--starlight); font-weight: 500; margin-bottom: 8px; letter-spacing: 0.1em; }
.legend-row { display: flex; align-items: center; gap: 10px; padding: 4px 0; color: var(--text-secondary); }
.legend-row .swatch { width: 14px; height: 14px; border-radius: 50%; flex-shrink: 0; }
.legend-row .swatch.you { background: radial-gradient(circle, var(--starlight-strong), var(--starlight)); box-shadow: 0 0 8px var(--starlight); }
.legend-row .swatch.cat { background: var(--healing-blue); }
.legend-row .swatch.std { background: var(--teal); }
.legend-row .swatch.support { background: var(--warm-orange); }

/* === モバイル === */
@media (max-width: 768px) {
  .header { padding: 12px 14px; flex-wrap: wrap; }
  .title-block h1 { font-size: 14px; }
  .title-block .sub { font-size: 10px; }
  .btn-action { padding: 6px 10px; font-size: 11px; }

  .controls { top: 68px; padding: 10px 14px; }
  .ctrl-label { font-size: 11px; }
  .ctrl-select { font-size: 12px; padding: 5px 10px; }
  .stat-pill { display: none; }

  .canvas-wrap { top: 132px; }

  .detail-panel { width: 100%; max-width: 100%; top: 132px; padding: 22px 18px; }
  .detail-title { font-size: 19px; }

  .legend { left: 12px; bottom: 12px; padding: 10px 14px; font-size: 11px; max-width: 240px; }
}

:focus-visible { outline: 2px solid var(--starlight); outline-offset: 3px; }

/* === SATOI 共通リッチトースト(alert置換)=== */
#satoi-toast-host { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); z-index: 9999; display: flex; flex-direction: column; gap: 10px; pointer-events: none; max-width: 92vw; }
.satoi-toast { pointer-events: auto; min-width: 280px; max-width: 480px; background: linear-gradient(135deg, rgba(11,23,54,0.96), rgba(26,37,72,0.96)); color: #F8F6F0; padding: 16px 22px 16px 18px; border-radius: 16px; box-shadow: 0 16px 40px rgba(11,23,54,0.35), 0 0 0 1px rgba(212,169,94,0.30); font-family: "Noto Sans JP", "Meiryo UI", sans-serif; font-size: 13.5px; line-height: 1.75; backdrop-filter: blur(14px); display: flex; gap: 14px; align-items: flex-start; opacity: 0; transform: translateY(20px); transition: opacity 0.4s cubic-bezier(0.4,0,0.2,1), transform 0.4s cubic-bezier(0.4,0,0.2,1); border-left: 3px solid #D4A95E; }
.satoi-toast.show { opacity: 1; transform: translateY(0); }
.satoi-toast.success { border-left-color: #14A6AB; }
.satoi-toast.info { border-left-color: #D4A95E; }
.satoi-toast.warn { border-left-color: #D4622A; }
.satoi-toast-icon { flex-shrink: 0; width: 28px; height: 28px; border-radius: 50%; background: rgba(212,169,94,0.18); display: inline-flex; align-items: center; justify-content: center; font-size: 14px; }
.satoi-toast.success .satoi-toast-icon { background: rgba(20,166,171,0.20); }
.satoi-toast.warn .satoi-toast-icon { background: rgba(212,98,42,0.20); }
.satoi-toast-body { flex: 1; white-space: pre-line; }
.satoi-toast-body strong { color: #F0C97A; font-weight: 600; }
.satoi-toast-close { background: transparent; border: none; color: rgba(248,246,240,0.5); cursor: pointer; font-size: 18px; line-height: 1; padding: 2px 4px; }
.satoi-toast-close:hover { color: #F0C97A; }
.satoi-toast-cta { margin-top: 8px; display: inline-block; padding: 6px 14px; background: rgba(212,169,94,0.20); color: #F0C97A; border: 1px solid rgba(212,169,94,0.5); border-radius: 14px; font-size: 11.5px; cursor: pointer; transition: all 0.2s; text-decoration: none; }
.satoi-toast-cta:hover { background: #D4A95E; color: #0B1736; }
@media (max-width: 768px) {
  #satoi-toast-host { bottom: 14px; }
  .satoi-toast { min-width: auto; width: calc(100vw - 28px); padding: 14px 16px; font-size: 12.5px; }
}


/* === SATOI 共通モバイル対応(iPad/iPhone)=== */
@media (max-width: 1024px) {
  /* iPad 縦 ・ ヘッダー狭め */
  .header { padding: 14px 22px !important; }
  .section, .wrap, .container, main, .main { padding-left: 22px !important; padding-right: 22px !important; }
}
@media (max-width: 768px) {
  /* iPhone ・ 主要メトリクスをモバイル最適化 */
  html { font-size: 15px; }
  body { font-size: 15px; line-height: 1.75; }
  .header { padding: 12px 14px !important; }
  h1, .hero-title, .hero-title-l1 { font-size: clamp(24px, 6vw, 32px) !important; line-height: 1.5 !important; }
  h2, .section-title, .nbm-title, .mission-line { font-size: clamp(20px, 5vw, 28px) !important; line-height: 1.55 !important; }
  h3 { font-size: 17px !important; }
  .section, .container, .wrap, main, .main, section { padding-left: 14px !important; padding-right: 14px !important; }
  section, .section { padding-top: 50px !important; padding-bottom: 50px !important; }
  /* グリッドを1列に */
  .grid, .cards, .types-grid, .stories-grid, .forum-grid, .family-grid, .promise-list, .partner-grid, .gov-grid, .numbers-grid, .empse-grid, .pubmed-list, .sources-grid, .criteria-grid, .tx-cat-grid, .map-wrap, .emg-grid, .emg-consent-grid, .emg-contacts, .kids-talk-wrap, .cat-grid, .videos-grid, .cat-cards, .partner-cards, .promise-cards, .principle-cards, .pricing-grid, .pricing-cards, .step-cards, .info-cards, .role-cards, .news-grid {
    grid-template-columns: 1fr !important;
    gap: 14px !important;
  }
  /* 横スクロールのみ許す要素は残す */
  .b1-journey-bar, .journey-bar, .types-tabs { overflow-x: auto !important; -webkit-overflow-scrolling: touch; }
  /* ヒーローの padding 圧縮 */
  .hero { padding: 90px 14px 50px !important; min-height: auto !important; }
  /* 大きい見出し */
  .opener-line { font-size: 24px !important; margin-bottom: 40px !important; }
  /* タップ領域 44px 最低 */
  .btn, button, .login-btn, .nav-mini a, .filter-chip, .cat-card, .type-card, .story-card, .forum-card { min-height: 40px; }
  /* テーブル横スクロール */
  table { display: block; overflow-x: auto; -webkit-overflow-scrolling: touch; }
  /* マイチーム ホイール → 縦並びに */
  .team-wheel-wrap, .team-wheel { width: 100% !important; height: auto !important; min-height: 360px; }
  /* モーダル系: 画面いっぱいに */
  .modal, .overlay-modal, [class*='Modal'], [class*='modal'] { max-width: 100vw !important; }
  /* ナビ縮小 */
  .nav-mini, .nav { gap: 12px !important; font-size: 12px !important; }
  /* フォーム入力 */
  input, textarea, select { font-size: 16px !important; } /* iOSのズーム防止 */
  /* SVG レーダーチャートの収まり */
  .empse-chart, .empse-chart-wrap { width: 100% !important; max-width: 320px; height: auto !important; margin: 0 auto !important; }
  /* B1 7ステップを横スクロールに */
  .steps-row { overflow-x: auto; -webkit-overflow-scrolling: touch; gap: 10px; }
  .steps-row .step { flex-shrink: 0; min-width: 80px; }
  /* G2 サイドナビは画面下部固定 or hamburger 想定 */
  .sidebar, .side-nav, .g2-sidebar { position: relative !important; width: 100% !important; height: auto !important; overflow-x: auto !important; display: flex !important; }
}
@media (max-width: 480px) {
  /* 極小画面 */
  .hero { padding: 80px 12px 40px !important; }
  .b1-journey-bar { padding: 8px 10px !important; }
  .satoi-toast { font-size: 12px; padding: 12px 14px; }
}


/* === SATOI ユニバーサル横断ナビ(戻る/ホーム/言語) === */
#satoi-univ-nav { position: fixed; top: 50%; right: 14px; transform: translateY(-50%); z-index: 9998; display: flex; flex-direction: column; gap: 8px; pointer-events: none; }
.satoi-univ-btn { pointer-events: auto; width: 44px; height: 44px; border-radius: 50%; background: rgba(11,23,54,0.85); color: #F0C97A; border: 1px solid rgba(212,169,94,0.4); display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 16px; backdrop-filter: blur(10px); transition: all 0.3s; box-shadow: 0 6px 18px rgba(11,23,54,0.25); font-family: inherit; }
.satoi-univ-btn:hover { background: #D4A95E; color: #0B1736; transform: scale(1.1); }
.satoi-univ-btn[title]::after { content: attr(title); position: absolute; right: 54px; background: rgba(11,23,54,0.92); color: #F8F6F0; font-size: 11px; padding: 4px 10px; border-radius: 8px; white-space: nowrap; opacity: 0; pointer-events: none; transition: opacity 0.2s; }
.satoi-univ-btn:hover::after { opacity: 1; }
.satoi-lang-pop { position: absolute; right: 54px; top: 0; background: rgba(11,23,54,0.94); border: 1px solid rgba(212,169,94,0.4); border-radius: 12px; padding: 6px; min-width: 130px; display: none; flex-direction: column; gap: 2px; box-shadow: 0 14px 30px rgba(0,0,0,0.4); }
.satoi-lang-pop.show { display: flex; }
.satoi-lang-opt { padding: 8px 14px; border-radius: 8px; color: #F8F6F0; font-size: 12px; cursor: pointer; text-align: left; background: transparent; border: none; font-family: inherit; }
.satoi-lang-opt:hover { background: rgba(212,169,94,0.18); color: #F0C97A; }
.satoi-lang-opt.active { background: rgba(212,169,94,0.25); color: #F0C97A; font-weight: 600; }
@media (max-width: 768px) { #satoi-univ-nav { right: 8px; bottom: 80px; top: auto; transform: none; } .satoi-univ-btn { width: 40px; height: 40px; font-size: 14px; } }

</style>
</head>

/* === SATOI 共通リッチトースト関数 === */
(function ensureToastHost(){
  if (document.getElementById('satoi-toast-host')) return;
  document.addEventListener('DOMContentLoaded', () => {
    if (!document.getElementById('satoi-toast-host')) {
      const host = document.createElement('div');
      host.id = 'satoi-toast-host';
      document.body.appendChild(host);
    }
  });
  if (document.body && !document.getElementById('satoi-toast-host')) {
    const host = document.createElement('div');
    host.id = 'satoi-toast-host';
    document.body.appendChild(host);
  }
})();
function satoiNotify(msg, opts) {
  opts = opts || {};
  let host = document.getElementById('satoi-toast-host');
  if (!host) { host = document.createElement('div'); host.id = 'satoi-toast-host'; document.body.appendChild(host); }
  const t = document.createElement('div');
  const kind = opts.kind || (msg.indexOf('✓')===0 ? 'success' : 'info');
  t.className = 'satoi-toast ' + kind;
  const icon = opts.icon || (kind === 'success' ? '✓' : (kind === 'warn' ? '!' : '●'));
  const body = msg.replace(/\\n/g, '\n').replace(/\n/g, '<br>');
  let html = '<span class="satoi-toast-icon">'+icon+'</span><div class="satoi-toast-body">'+body+'</div>';
  if (opts.cta && opts.href) {
    html = html.replace('</div>', '<a class="satoi-toast-cta" href="'+opts.href+'">'+opts.cta+' →</a></div>');
  }
  html += '<button class="satoi-toast-close" aria-label="close">×</button>';
  t.innerHTML = html;
  host.appendChild(t);
  requestAnimationFrame(() => t.classList.add('show'));
  const dur = opts.duration || 4200;
  const closer = () => { t.classList.remove('show'); setTimeout(()=>t.remove(), 450); };
  t.querySelector('.satoi-toast-close').addEventListener('click', closer);
  setTimeout(closer, dur);
  return t;
}
// 既存の alert を全て satoiNotify にフォールバック(他コードからのalert呼び出しもキャッチ)
window.__origAlert = window.alert;

(function setupUnivNav(){

      + '<div style="position:relative;"><button class="satoi-univ-btn" id="satoi-lang-btn" title="言語" aria-label="言語">🌐</button>'
      + '<div class="satoi-lang-pop" id="satoi-lang-pop"><button class="satoi-lang-opt active" data-lang="ja">日本語</button><button class="satoi-lang-opt" data-lang="en">English</button><button class="satoi-lang-opt" data-lang="zh">中文</button><button class="satoi-lang-opt" data-lang="ko">한국어</button></div></div>';
    document.body.appendChild(nav);
    document.getElementById('satoi-back-btn').addEventListener('click', () => { if (history.length > 1) history.back(); else location.href='SATOI_Mock_v1_A1_entrance.html'; });
    document.getElementById('satoi-home-btn').addEventListener('click', () => location.href='SATOI_Mock_v1_A1_entrance.html');
    document.getElementById('satoi-hub-btn').addEventListener('click', () => location.href='SATOI_Mock_v1_B1_hub.html');
    const conBtn = document.getElementById('satoi-con-btn'); if (conBtn) conBtn.addEventListener('click', () => location.href='SATOI_Mock_v1_CON_concierge.html');
    const langBtn = document.getElementById('satoi-lang-btn');
    const langPop = document.getElementById('satoi-lang-pop');
    langBtn.addEventListener('click', (e) => { e.stopPropagation(); langPop.classList.toggle('show'); });
    document.addEventListener('click', (e) => { if (!langPop.contains(e.target) && e.target !== langBtn) langPop.classList.remove('show'); });
    langPop.querySelectorAll('.satoi-lang-opt').forEach(b => {
      b.addEventListener('click', () => {
        langPop.querySelectorAll('.satoi-lang-opt').forEach(x => x.classList.remove('active'));
        b.classList.add('active');
        const lang = b.dataset.lang;
        const labels = { ja: '日本語に切り替えました', en: 'Switched to English (translation coming soon)', zh: '已切换到中文(翻译即将推出)', ko: '한국어로 전환되었습니다 (번역 준비 중)' };
        if (typeof satoiNotify === 'function') satoiNotify(labels[lang] || labels.ja, { kind: 'info', duration: 3000 });
        document.documentElement.lang = lang;
        langPop.classList.remove('show');
      });
    });
  }
  if (document.body) inject();
  else document.addEventListener('DOMContentLoaded', inject);
})();

window.alert = function(msg){ try { satoiNotify(String(msg)); } catch(e){ window.__origAlert(msg); } };

const initialCancer = urlParams.get('cancer') || 'breast';

// ===== マインドマップ描画 =====
const svg = document.getElementById('mindmap');
const SVG_NS = 'http://www.w3.org/2000/svg';

function el(tag, attrs = {}) {
  const e = document.createElementNS(SVG_NS, tag);
  Object.entries(attrs).forEach(([k, v]) => e.setAttribute(k, v));
  return e;
}

function renderMap(cancerKey, stageKey) {
  const data = TREATMENT_TREE[cancerKey];
  svg.innerHTML = '';

  const W = 1600, H = 1100;
  const cx = W / 2, cy = H / 2;

  // 中央ノード(あなた)
  const youGroup = el('g', { class: 'node', 'data-type': 'you' });

  // 中心の glow
  const glow = el('circle', { cx, cy, r: 90, fill: 'url(#youGrad)', opacity: 0.4 });
  const youCore = el('circle', { cx, cy, r: 56, fill: 'url(#youGrad)', stroke: '#F0C97A', 'stroke-width': 2 });
  const youLabel = el('text', { x: cx, y: cy - 6, class: 'node-label', 'text-anchor': 'middle', 'font-size': 17, 'font-weight': 500 });
  youLabel.textContent = 'あなた';
  const youSub = el('text', { x: cx, y: cy + 16, class: 'node-label', 'text-anchor': 'middle', 'font-size': 13, fill: '#D4A95E' });
  youSub.textContent = `${data.name} ${stageKey}期`;
  const youCohort = el('text', { x: cx, y: cy + 38, class: 'node-count', 'text-anchor': 'middle', 'font-size': 12 });
  youCohort.textContent = `同状況 ${(data.stageDist[stageKey] || 0).toLocaleString()}人`;

  // defs(グラデ)
  const defs = el('defs');
  defs.innerHTML = `
    <radialGradient id="youGrad" cx="35%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#F0C97A"/>
      <stop offset="50%" stop-color="#D4A95E"/>
      <stop offset="100%" stop-color="rgba(212,169,94,0.15)"/>
    </radialGradient>
    <radialGradient id="catGrad" cx="35%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#A8C7DC"/>
      <stop offset="100%" stop-color="#5B85A0"/>
    </radialGradient>
    <radialGradient id="stdGrad" cx="35%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#2BA0A5"/>
      <stop offset="100%" stop-color="#0D7377"/>
    </radialGradient>
    <radialGradient id="supportGrad" cx="35%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#E89556"/>
      <stop offset="100%" stop-color="#D4622A"/>
    </radialGradient>
  `;
  svg.appendChild(defs);
  svg.appendChild(glow);

  // カテゴリノード配置(放射状)
  const cats = data.categories;
  const catRadius = 280;
  const catAngles = cats.length === 4
    ? [-Math.PI*0.85, -Math.PI*0.15, Math.PI*0.15, Math.PI*0.85]
    : cats.length === 5
      ? [-Math.PI*0.9, -Math.PI*0.3, 0, Math.PI*0.3, Math.PI*0.9]
      : cats.map((_, i) => (Math.PI*2 / cats.length) * i - Math.PI/2);

  cats.forEach((cat, i) => {
    const ang = catAngles[i];
    const catX = cx + Math.cos(ang) * catRadius;
    const catY = cy + Math.sin(ang) * catRadius;

    // 中央→カテゴリ線
    const line = el('path', {
      d: `M${cx},${cy} Q${(cx+catX)/2 + Math.cos(ang+Math.PI/2)*20},${(cy+catY)/2 + Math.sin(ang+Math.PI/2)*20} ${catX},${catY}`,
      class: 'branch-line'
    });
    svg.appendChild(line);

    // カテゴリノード
    const catGroup = el('g', { class: 'node', 'data-type': 'cat', 'data-cat': cat.id });
    const catCircle = el('circle', { cx: catX, cy: catY, r: 50, fill: 'url(#catGrad)', stroke: '#7FA8C9', 'stroke-width': 1.5 });
    const catLabel = el('text', { x: catX, y: catY - 2, class: 'node-label', 'text-anchor': 'middle', 'font-size': 15, 'font-weight': 500 });
    catLabel.textContent = cat.name;
    const catCount = el('text', { x: catX, y: catY + 16, class: 'node-count', 'text-anchor': 'middle', 'font-size': 11 });
    catCount.textContent = `${cat.chosen}%が選択`;
    catGroup.append(catCircle, catLabel, catCount);
    catGroup.addEventListener('click', () => showCategoryDetail(cat, data, stageKey));
    svg.appendChild(catGroup);

    // 治療ノード(カテゴリの外側に放射状)
    const tCount = cat.treatments.length;
    const tBaseAng = ang;
    const tSpread = Math.PI * 0.55;
    const tStart = tBaseAng - tSpread / 2;
    const tStep = tCount > 1 ? tSpread / (tCount - 1) : 0;
    const tRadius = 200;

    cat.treatments.forEach((tr, j) => {
      const tAng = tCount === 1 ? tBaseAng : tStart + tStep * j;
      const tX = catX + Math.cos(tAng) * tRadius;
      const tY = catY + Math.sin(tAng) * tRadius;

      // 線
      const tLine = el('path', {
        d: `M${catX},${catY} Q${(catX+tX)/2 + Math.cos(tAng+Math.PI/2)*8},${(catY+tY)/2 + Math.sin(tAng+Math.PI/2)*8} ${tX},${tY}`,
        class: 'branch-line'
      });
      svg.appendChild(tLine);

      // 治療ノード
      const isSupport = cat.id === 'support';
      const grad = isSupport ? 'url(#supportGrad)' : 'url(#stdGrad)';
      const stroke = isSupport ? '#D4622A' : '#0D7377';
      const tGroup = el('g', { class: 'node', 'data-type': 'treatment', 'data-treatment': tr.id });
      const tCircle = el('circle', { cx: tX, cy: tY, r: 38, fill: grad, stroke, 'stroke-width': 1.4 });

      // 名前(短く)
      const shortName = tr.name.length > 9 ? tr.name.slice(0, 8) + '…' : tr.name;
      const tLabel = el('text', { x: tX, y: tY - 1, class: 'node-label', 'text-anchor': 'middle', 'font-size': 11, 'font-weight': 500 });
      tLabel.textContent = shortName;
      const tCount2 = el('text', { x: tX, y: tY + 13, class: 'node-count', 'text-anchor': 'middle', 'font-size': 10 });
      const cohortNum = Math.round((data.stageDist[stageKey] || 0) * tr.chosen / 100);
      tCount2.textContent = `${cohortNum.toLocaleString()}人`;

      tGroup.append(tCircle, tLabel, tCount2);
      tGroup.addEventListener('click', () => showTreatmentDetail(tr, cat, data, stageKey));
      svg.appendChild(tGroup);
    });
  });

  // 最後に「あなた」(z-orderで前面)
  youGroup.append(youCore, youLabel, youSub, youCohort);
  svg.appendChild(youGroup);

  // ヘッダー更新
  document.getElementById('mapTitle').textContent = `${data.name} ステージ${stageKey} 治療マインドマップ`;
  document.getElementById('mapSub').textContent = `5年生存率 約${data.survival[stageKey]}% / 全国 ${(data.stageDist[stageKey]||0).toLocaleString()}人`;
  document.getElementById('cohortCount').textContent = (data.stageDist[stageKey]||0).toLocaleString();

  // 中央スクロール
  setTimeout(() => {
    const wrap = document.getElementById('canvasWrap');
    wrap.scrollLeft = (svg.scrollWidth - wrap.clientWidth) / 2;
    wrap.scrollTop = (svg.scrollHeight - wrap.clientHeight) / 2;
  }, 50);
}

    <div class="detail-meta">${data.name} ステージ${stageKey} の方の <strong style="color:#D4A95E">${tr.chosen}%</strong>(約${cohortNum.toLocaleString()}人)が選択</div>

    <div class="detail-section">

      <p>${tr.side}</p>
    </div>

    <div class="detail-section">
      <h4>📈 治療成績・効果</h4>
      <p>${tr.outcome}</p>
    </div>

    <div class="detail-section">
      <h4>📌 ポイント</h4>

    </div>

    <div class="detail-section">
      <h4>📊 統計</h4>
      <div class="stat-row"><span>選択率</span><span class="v">${tr.chosen}%</span></div>
      <div class="stat-row"><span>同じ治療を受けた方</span><span class="v">${cohortNum.toLocaleString()}人</span></div>
      <div class="stat-row"><span>5年生存率(ステージ${stageKey})</span><span class="v">${data.survival[stageKey]}%</span></div>
    </div>

    <button class="detail-cta" onclick="satoiNotify('先生に聞きたいことカードを生成中…\\n\\n・なぜ私にこの治療?\\n・他の選択肢との違いは?\\n・副作用への対処法は?\\n・治療期間は?\\n・セカンドオピニオン紹介状\\n\\n→ PDF/QR/メールで主治医に渡せます\\n(次画面 B6)')">📝 先生に聞きたいことカードを作る</button>

    <a href="#" class="detail-cta secondary" onclick="satoiNotify('関連文献(PubMed)\\n→ AI翻訳で患者向けに分かりやすく\\n(次画面 B5)'); return false;">📚 関連文献を読む(AI翻訳)</a>
  `;
  panel.classList.add('open');
}

function showCategoryDetail(cat, data, stageKey) {
  const panel = document.getElementById('detailPanel');
  const content = document.getElementById('detailContent');

  const trList = cat.treatments.map(t => {
    const num = Math.round((data.stageDist[stageKey]||0) * t.chosen / 100);
    return `<div class="stat-row" onclick="satoiNotify('「${t.name}」の詳細を見る → 治療ノードをクリックしてください')" style="cursor:pointer;"><span>${t.name}</span><span class="v">${num.toLocaleString()}人</span></div>`;
  }).join('');

  content.innerHTML = `
    <div class="detail-eyebrow">治療カテゴリ</div>
    <div class="detail-title">${cat.name}</div>
    <div class="detail-meta">${data.name} ステージ${stageKey} の方の <strong style="color:#D4A95E">${cat.chosen}%</strong>が、このカテゴリの治療を経験</div>

    <div class="detail-section">
      <h4>選べる治療(${cat.treatments.length}件)</h4>
      ${trList}
    </div>

    <div class="detail-section">
      <h4>📌 このカテゴリの位置づけ</h4>
      <p>${cat.id === 'surgery' ? 'がんを直接取り除く治療。早期では根治を目指せます。' :
            cat.id === 'drug' ? '全身に作用する治療。手術と組み合わせ、または進行例で中心的役割。' :
            cat.id === 'radiation' ? '局所制御に有効。手術困難例にも選択肢。' :
            cat.id === 'support' ? '主要治療を支える併用治療。早期からのケアがQOLを大きく左右します。' :
            cat.id === 'watch' ? '即座の治療を行わず、慎重に追跡する選択肢。低リスク群で重要。' :
            '治療カテゴリ'}</p>
    </div>

    <button class="detail-cta" onclick="document.getElementById('detailPanel').classList.remove('open')">マップに戻る</button>
  `;
  panel.classList.add('open');
}

});

    const s = document.createElement('div');

    const size = Math.random() * 1.8 + 0.5;

    s.style.height = size + 'px';
    s.style.left = Math.random() * 100 + '%';
    s.style.top = Math.random() * 100 + '%';
    s.style.animationDelay = (Math.random() * 4) + 's';
    s.style.animationDuration = (3 + Math.random() * 3) + 's';
    layer.appendChild(s);
  }
})();
